services:
  brownies-frontend:
    build:
      context: .
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-/api/v1}
    container_name: brownies-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    networks:
      - brownies-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.brownies.rule=Host(`${TRAEFIK_HOST:-brownies.localhost}`)"
      - "traefik.http.routers.brownies.entrypoints=websecure"
      - "traefik.http.routers.brownies.tls.certresolver=letsencrypt"
      - "traefik.http.services.brownies.loadbalancer.server.port=80"
      - "traefik.docker.network=brownies-net"

  brownies-backend:
    image: ${BACKEND_IMAGE:-ghcr.io/your-org/brownies-backend:latest}
    container_name: brownies-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://brownies:brownies@brownies-db:5432/brownies}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=*
    networks:
      - brownies-net
    depends_on:
      brownies-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  brownies-db:
    image: postgres:16-alpine
    container_name: brownies-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-brownies}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-brownies}
      - POSTGRES_DB=${DB_NAME:-brownies}
    volumes:
      - brownies-pgdata:/var/lib/postgresql/data
    networks:
      - brownies-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-brownies} -d ${DB_NAME:-brownies}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"

volumes:
  brownies-pgdata:
    driver: local

networks:
  brownies-net:
    driver: bridge
